<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RP Engine</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #333;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #7c6fe0;
    --accent-hover: #9589f0;
    --success: #4caf50;
    --error: #ef5350;
    --warning: #ffa726;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  #server-status {
    font-size: 0.85rem;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    background: var(--surface2);
  }

  #server-status.online { color: var(--success); }
  #server-status.offline { color: var(--error); }

  .container {
    max-width: 900px;
    margin: 2rem auto;
    padding: 0 1.5rem;
  }

  /* ── RP List ── */
  .section-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 1rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 0.8rem;
  }

  #rp-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
    margin-bottom: 2.5rem;
  }

  .rp-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem;
    transition: border-color 0.2s;
  }

  .rp-card:hover { border-color: var(--accent); }

  .rp-card h3 {
    font-size: 1.05rem;
    margin-bottom: 0.5rem;
  }

  .rp-card .meta {
    font-size: 0.82rem;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .badge {
    display: inline-block;
    font-size: 0.72rem;
    padding: 0.15rem 0.5rem;
    border-radius: 10px;
    font-weight: 600;
    margin-left: 0.4rem;
    vertical-align: middle;
  }

  .badge.ok { background: rgba(76, 175, 80, 0.15); color: var(--success); }
  .badge.warn { background: rgba(255, 167, 38, 0.15); color: var(--warning); }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 2rem;
    color: var(--text-dim);
    font-style: italic;
  }

  /* ── Create Form ── */
  .create-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
  }

  .create-section h2 {
    font-size: 1rem;
    margin-bottom: 1.2rem;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 0.8rem;
    color: var(--text-dim);
    font-weight: 500;
  }

  input, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.55rem 0.75rem;
    color: var(--text);
    font-size: 0.9rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus { border-color: var(--accent); }

  input::placeholder { color: #555; }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.65rem 1.5rem;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    font-family: inherit;
  }

  .btn:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .form-actions {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-top: 0.5rem;
  }

  #create-msg {
    font-size: 0.85rem;
    flex: 1;
  }

  #create-msg.success { color: var(--success); }
  #create-msg.error { color: var(--error); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1.2rem;
    font-size: 0.85rem;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 100;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── Created Files ── */
  .created-files {
    margin-top: 0.8rem;
    padding: 0.8rem;
    background: var(--surface2);
    border-radius: 6px;
    font-size: 0.78rem;
    font-family: 'Consolas', 'Fira Code', monospace;
    color: var(--text-dim);
    line-height: 1.6;
    max-height: 200px;
    overflow-y: auto;
  }
</style>
</head>
<body>

<header>
  <h1>RP Engine</h1>
  <span id="server-status">checking...</span>
</header>

<div class="container">

  <!-- Existing RPs -->
  <div class="section-title">Your RPs</div>
  <div id="rp-list">
    <div class="empty-state">Loading...</div>
  </div>

  <!-- Create New RP -->
  <div class="create-section">
    <h2>Create New RP</h2>
    <form id="create-form" class="form-grid">

      <div class="form-group full">
        <label for="rp-name">RP Name</label>
        <input type="text" id="rp-name" placeholder="e.g. Blood & Roses" required>
      </div>

      <div class="form-group">
        <label for="pov-mode">POV Mode</label>
        <select id="pov-mode">
          <option value="single">Single Character</option>
          <option value="dual">Dual Character</option>
        </select>
      </div>

      <div class="form-group">
        <label for="scene-pacing">Scene Pacing</label>
        <select id="scene-pacing">
          <option value="slow">Slow</option>
          <option value="moderate" selected>Moderate</option>
          <option value="fast">Fast</option>
        </select>
      </div>

      <div class="form-group">
        <label for="tone">Tone</label>
        <input type="text" id="tone" placeholder="e.g. dark, gritty, romantic">
      </div>

      <div class="form-group" id="dual-chars-group" style="display:none">
        <label for="dual-chars">Dual Characters (comma-separated)</label>
        <input type="text" id="dual-chars" placeholder="e.g. Lilith, Silas">
      </div>

      <div class="form-actions">
        <button type="submit" class="btn" id="create-btn">Create RP</button>
        <span id="create-msg"></span>
      </div>

    </form>

    <div id="created-files-container"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:3000';

// ── Server status ──
async function checkHealth() {
  const el = document.getElementById('server-status');
  try {
    const res = await fetch(`${API}/health`);
    const data = await res.json();
    el.textContent = `v${data.version} — ${data.indexed_cards} cards indexed`;
    el.className = 'online';
  } catch {
    el.textContent = 'offline';
    el.className = 'offline';
  }
}

// ── Load RP list ──
async function loadRPs() {
  const container = document.getElementById('rp-list');
  try {
    const res = await fetch(`${API}/api/rp`);
    const rps = await res.json();

    if (rps.length === 0) {
      container.innerHTML = '<div class="empty-state">No RPs found. Create one below!</div>';
      return;
    }

    container.innerHTML = rps.map(rp => `
      <div class="rp-card">
        <h3>${esc(rp.rp_folder)}</h3>
        <div class="meta">
          ${rp.card_count} story cards
          <span class="badge ${rp.has_guidelines ? 'ok' : 'warn'}">
            ${rp.has_guidelines ? 'Guidelines' : 'No Guidelines'}
          </span>
          <br>
          ${rp.branches.length ? 'Branches: ' + rp.branches.join(', ') : 'No branches yet'}
        </div>
      </div>
    `).join('');
  } catch {
    container.innerHTML = '<div class="empty-state">Could not connect to RP Engine API</div>';
  }
}

// ── Create RP ──
document.getElementById('create-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const btn = document.getElementById('create-btn');
  const msg = document.getElementById('create-msg');
  const filesContainer = document.getElementById('created-files-container');
  const name = document.getElementById('rp-name').value.trim();

  if (!name) return;

  btn.disabled = true;
  msg.textContent = '';
  msg.className = '';
  filesContainer.innerHTML = '';

  const body = {
    rp_name: name,
    pov_mode: document.getElementById('pov-mode').value,
    scene_pacing: document.getElementById('scene-pacing').value,
    tone: document.getElementById('tone').value.trim(),
  };

  if (body.pov_mode === 'dual') {
    const chars = document.getElementById('dual-chars').value
      .split(',').map(s => s.trim()).filter(Boolean);
    body.dual_characters = chars;
  }

  try {
    const res = await fetch(`${API}/api/rp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || `HTTP ${res.status}`);
    }

    const data = await res.json();
    msg.textContent = `Created "${data.rp_folder}" successfully!`;
    msg.className = 'success';

    filesContainer.innerHTML = `
      <div class="created-files">
        <strong>Created:</strong><br>
        ${data.created_files.map(f => esc(f)).join('<br>')}
      </div>
    `;

    document.getElementById('rp-name').value = '';
    toast(`"${data.rp_folder}" created!`);
    loadRPs();
    checkHealth();

  } catch (err) {
    msg.textContent = err.message;
    msg.className = 'error';
  } finally {
    btn.disabled = false;
  }
});

// ── Dual character toggle ──
document.getElementById('pov-mode').addEventListener('change', (e) => {
  document.getElementById('dual-chars-group').style.display =
    e.target.value === 'dual' ? '' : 'none';
});

// ── Helpers ──
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function toast(message) {
  const el = document.getElementById('toast');
  el.textContent = message;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Init ──
checkHealth();
loadRPs();
</script>

</body>
</html>
