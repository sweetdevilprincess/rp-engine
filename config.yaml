server:
  host: "0.0.0.0"
  port: 3000
  cors_origins:
    - "http://localhost:*"
    - "http://127.0.0.1:*"

paths:
  vault_root: ".."
  db_path: "data/rp-engine.db"

llm:
  provider: "openrouter"
  api_key: "env:OPENROUTER_API_KEY"
  models:
    npc_reactions: "anthropic/claude-haiku"
    response_analysis: "google/gemini-2.0-flash-001"
    card_generation: "google/gemini-2.0-flash-001"
    embeddings: "openai/text-embedding-3-small"
  fallback_model: "google/gemini-2.0-flash-001"

context:
  max_documents: 5
  max_graph_hops: 2
  stale_threshold_turns: 8

search:
  vector_weight: 0.7
  bm25_weight: 0.3
  similarity_threshold: 0.7
  chunk_size: 1000
  chunk_overlap: 200

rp:
  default_pov_character: "Lilith"

trust:
  increase_value: 1
  decrease_value: 2
  session_max_gain: 8
  session_max_loss: -15
  min_score: -50
  max_score: 50
